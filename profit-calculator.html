const rm = v => `RM${(parseFloat(v)||0).toFixed(2)}`;
const pct = v => `${(parseFloat(v)||0).toFixed(1)}%`;

const calcFees = (price, rule) => {
  const c = price*(rule.commission/100), t = price*(rule.transaction/100),
        pl = price*(rule.platform/100), pay = price*(rule.payment/100);
  return { commission:c, transaction:t, platform:pl, payment:pay, total:c+t+pl+pay };
};

const calcMkt = (price, mkt) => {
  let total = 0; const bd = {};
  Object.entries(mkt).forEach(([k,item]) => {
    if (!item.enabled) { bd[k]=0; return; }
    const v = item.type==="percent" ? price*(item.value/100) : item.value;
    bd[k]=v; total+=v;
  });
  return { total, bd };
};

const calc = (price, cost, rule, mkt) => {
  const mpFees = calcFees(price, rule);
  const mktCost = calcMkt(price, mkt);
  const totalCost = cost + mpFees.total + mktCost.total;
  const netProfit = price - totalCost;
  const margin = price>0 ? (netProfit/price)*100 : 0;
  const roi = cost>0 ? (netProfit/cost)*100 : 0;
  return { netProfit, margin, roi, sellerPayout: price-mpFees.total, totalCost, mpFees, mktCost,
           breakEven: totalCost, recommended: totalCost*1.20, premium: totalCost*1.35 };
};

              <div className="type-seg">
                <button className={item.type==="percent"?"active":""} onClick={()=>updMkt(k,"type","percent")}>%</button>
                <button className={item.type==="fixed"?"active":""} onClick={()=>updMkt(k,"type","fixed")}>RM</button>
              </div>
              <input className="form-input mono" style={{width:80}} type="number" min="0" step="0.1" value={item.value} onChange={e=>updMkt(k,"value",parseFloat(e.target.value)||0)}/>
              <span style={{fontSize:11,color:"#6B7280",width:64,textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>
                {item.type==="percent"?rm(price*item.value/100):"fixed"}
              </span>
            </div>
          )}
        </div>
      ))}
      {res.mktCost.total>0&&<div className="total-bar" style={{marginTop:10,background:"#FFFBEB",border:"1px solid #FDE68A"}}><span className="total-bar-label">Jumlah Kos Pemasaran</span><span className="total-bar-value" style={{color:"#D97706"}}>{rm(res.mktCost.total)}</span></div>}
    </div>

    {/* Harga */}
    <div className="card">
      <div className="card-header"><div className="card-title"><span className="card-title-icon">🏷️</span>Harga Jual</div></div>
      <div className="form-group" style={{marginBottom:14}}>
        <label className="form-label">Masukkan Harga Jual (RM)</label>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,color:"#9CA3AF"}}>RM</span>
          <input className="form-input mono" style={{fontSize:24,fontWeight:800,padding:"10px 14px"}} type="number" min="0" step="0.10" value={price} onChange={e=>setPrice(parseFloat(e.target.value)||0)}/>
        </div>
      </div>
      <div className="price-pills">
        <div className="price-pill breakeven"><div className="price-pill-label">Titik Pulang Modal</div><div className="price-pill-value">{rm(res.breakEven)}</div></div>
        <div className="price-pill recommended"><div className="price-pill-label">⭐ Disyorkan</div><div className="price-pill-value">{rm(res.recommended)}</div></div>
        <div className="price-pill premium"><div className="price-pill-label">Premium</div><div className="price-pill-value">{rm(res.premium)}</div></div>
      </div>
    </div>

    {/* Keputusan */}
    <div className="card">
      <div className="card-header">
        <div><div className="card-title"><span className="card-title-icon">📊</span>Keputusan Pengiraan</div><div className="card-sub">Analisis untung berkuasa AI</div></div>
        <button className="btn btn-primary btn-sm" onClick={fetchAI} disabled={aiLoading}>
          {aiLoading?<><span className="spinner"></span> Menganalisis...</>:"✨ Penasihat AI"}
        </button>
      </div>
      <div className="result-grid" style={{marginBottom:14}}>
        {[
          {label:"Untung Bersih",value:rm(res.netProfit),cls:res.netProfit>=0?"green":"red"},
          {label:"Margin Untung",value:pct(res.margin),cls:res.margin>=15?"green":res.margin>=5?"orange":"red"},
          {label:"ROI",value:pct(res.roi),cls:res.roi>=20?"green":res.roi>=0?"orange":"red"},
          {label:"Bayaran Penjual",value:rm(res.sellerPayout),cls:"primary"},
          {label:"Fee Marketplace",value:rm(res.mpFees.total),cls:"red"},
          {label:"Jumlah Kos",value:rm(res.totalCost),cls:""},
        ].map((r,i)=>(
          <div key={i} className="result-item"><div className="result-label">{r.label}</div><div className={`result-value ${r.cls}`}>{r.value}</div></div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div className="fee-breakdown">
          <div className="fee-breakdown-title">Perincian Fee Marketplace</div>
          <div className="fee-row"><span className="fee-key">Komisyen ({feeRule.commission}%)</span><span className="fee-val">{rm(res.mpFees.commission)}</span></div>
          <div className="fee-row"><span className="fee-key">Transaksi ({feeRule.transaction}%)</span><span className="fee-val">{rm(res.mpFees.transaction)}</span></div>
          <div className="fee-row"><span className="fee-key">Pembayaran ({feeRule.payment}%)</span><span className="fee-val">{rm(res.mpFees.payment)}</span></div>
          <div className="fee-total-row"><span className="fee-total-key">Jumlah Fee</span><span className="fee-total-val">{rm(res.mpFees.total)}</span></div>
        </div>
        <div className="fee-breakdown">
          <div className="fee-breakdown-title">Pecahan Kos Penuh</div>
          <div className="fee-row"><span className="fee-key">Kos Produk</span><span className="fee-val">{rm(totalCost)}</span></div>
          <div className="fee-row"><span className="fee-key">Fee Marketplace</span><span className="fee-val">{rm(res.mpFees.total)}</span></div>
          <div className="fee-row"><span className="fee-key">Pemasaran</span><span className="fee-val">{rm(res.mktCost.total)}</span></div>
          <div className="fee-total-row"><span className="fee-total-key">Jumlah Kos</span><span className="fee-total-val">{rm(res.totalCost)}</span></div>
        </div>
      </div>
    </div>

    {/* AI Advice */}
    {aiAdvice&&(
      <div className="ai-box">
        <div className="ai-header">
          <div className="ai-dot"/><span className="ai-badge">PENASIHAT AI</span>
          <span style={{fontSize:12,fontWeight:800,color:RATING_COLOR[aiAdvice.rating]||"#D97706",marginLeft:"auto",padding:"2px 10px",background:"white",borderRadius:20,border:"1px solid #E5E7EB"}}>{aiAdvice.rating}</span>
        </div>
        <div className="ai-summary">{aiAdvice.summary}</div>
        {aiAdvice.warning&&<div style={{padding:"8px 12px",background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:7,fontSize:12,color:"#92400E",marginBottom:10}}>⚠️ {aiAdvice.warning}</div>}
        <div className="ai-tips">{aiAdvice.tips?.map((t,i)=><div key={i} className="ai-tip"><span>→</span><span>{t}</span></div>)}</div>
        {aiAdvice.recommendedPrice>0&&(
          <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10,paddingTop:12,borderTop:"1px solid #FECACA"}}>
            <span style={{fontSize:12,color:"#6B7280",fontWeight:600}}>Harga Disyorkan AI:</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:800,color:"#C0000A"}}>{rm(aiAdvice.recommendedPrice)}</span>
            <button className="btn btn-primary btn-sm" onClick={()=>setPrice(aiAdvice.recommendedPrice)}>Guna</button>
          </div>
        )}
      </div>
    )}

    {/* Simulator */}
    <div className="card">
      <div className="card-header"><div className="card-title"><span className="card-title-icon">🎚️</span>Simulator Harga</div></div>
      <div className="sim-current"><div className="sim-price">{rm(price)}</div><div className="sim-label">Harga Jual Simulasi</div></div>
      <input type="range" className="price-slider"
        style={{background:`linear-gradient(to right, #C0000A ${sliderPct}%, #E5E7EB ${sliderPct}%)`}}
        min={minS} max={maxS} step={0.10} value={price} onChange={e=>setPrice(parseFloat(e.target.value))}/>
      <div className="slider-labels"><span className="slider-label">{rm(minS)}</span><span className="slider-label">{rm(maxS)}</span></div>
      <div className="result-grid" style={{marginTop:16}}>
        {[
          {label:"Untung Bersih",value:rm(res.netProfit),cls:res.netProfit>=0?"green":"red"},
          {label:"Margin",value:pct(res.margin),cls:res.margin>=15?"green":"orange"},
          {label:"ROI",value:pct(res.roi),cls:res.roi>=20?"green":"orange"},
          {label:"Fee MP",value:rm(res.mpFees.total),cls:"red"},
          {label:"Bayaran Penjual",value:rm(res.sellerPayout),cls:"primary"},
          {label:"Jumlah Kos",value:rm(res.totalCost),cls:""},
        ].map((r,i)=><div key={i} className="result-item"><div className="result-label">{r.label}</div><div className={`result-value ${r.cls}`}>{r.value}</div></div>)}
      </div>
    </div>

    {/* Senario */}
    <div className="card">
      <div className="card-header"><div className="card-title"><span className="card-title-icon">⚡</span>Perbandingan Senario</div></div>
      <div className="scenario-grid">
        {scenarios.map((s,i)=>(
          <div key={i} className="scenario-card">
            <div className="scenario-label">Senario {s.label}</div>
            <div className="scenario-name">{s.name}</div>
            <hr className="scenario-divider"/>
            <div className="scenario-row"><span className="scenario-key">Untung Bersih</span><span className={`scenario-val ${s.res.netProfit>=0?"green":"red"}`}>{rm(s.res.netProfit)}</span></div>
            <div className="scenario-row"><span className="scenario-key">Margin</span><span className="scenario-val" style={{color:s.res.margin>=15?"#059669":"#D97706"}}>{pct(s.res.margin)}</span></div>
            <div className="scenario-row"><span className="scenario-key">ROI</span><span className="scenario-val" style={{color:s.res.roi>=20?"#059669":"#D97706"}}>{pct(s.res.roi)}</span></div>
            <div className="scenario-row"><span className="scenario-key">Fee MP</span><span className="scenario-val red">{rm(s.res.mpFees.total)}</span></div>
            <div className="scenario-row"><span className="scenario-key">Pemasaran</span><span className="scenario-val red">{rm(s.res.mktCost.total)}</span></div>
          </div>
        ))}
      </div>
    </div>

    <div style={{display:"flex",gap:10,marginBottom:24}}>
      <button className="btn btn-primary" onClick={saveProduct}>💾 Simpan Produk</button>
      <button className="btn btn-outline" onClick={resetAll}>🔄 Reset</button>
    </div>
  </>);
}

function Saved({saved,search,setSearch,setSaved,setView}) {
  return (
    <div className="card">
      <div className="card-header">
        <div className="card-title"><span className="card-title-icon">📦</span>Produk Tersimpan</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div className="search-wrap"><span className="search-icon">🔍</span><input className="search-input" placeholder="Cari produk..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
          <button className="btn btn-primary btn-sm" onClick={()=>setView("calculator")}>+ Baru</button>
        </div>
      </div>
      {saved.length===0
        ?<div className="empty"><div className="empty-icon">📦</div><div className="empty-title">Tiada produk ditemui</div><div className="empty-sub">Cuba carian lain atau buat produk baru</div></div>
        :<table className="data-table">
          <thead><tr><th>Produk</th><th>Platform</th><th>Kategori</th><th>Harga</th><th>Margin</th><th>Untung</th><th>Tindakan</th></tr></thead>
          <tbody>{saved.map(p=>(
            <tr key={p.id}>
              <td><div style={{fontWeight:700,color:"#111827"}}>{p.name}</div><div style={{fontSize:11,color:"#9CA3AF"}}>{p.sku}</div></td>
              <td><span className={`badge badge-${p.platform}`}>{p.platform==="shopee"?"🛍️ Shopee":"🎵 TikTok"}</span></td>
              <td style={{color:"#6B7280",fontSize:12}}>{p.category}</td>
              <td><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{rm(p.price)}</span></td>
              <td><span style={{color:p.margin>20?"#059669":p.margin>10?"#D97706":"#EF4444",fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{pct(p.margin)}</span></td>
              <td><span style={{color:p.profit>0?"#059669":"#EF4444",fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{rm(p.profit)}</span></td>
              <td><button className="btn btn-danger btn-sm" onClick={()=>setSaved(s=>s.filter(x=>x.id!==p.id))}>Padam</button></td>
            </tr>
          ))}</tbody>
        </table>
      }
    </div>
  );
}

function Monitor() {
  return (<>
    <div className="alert-bar warning">⚠️ Pemantauan fee mengimbas sumber rasmi sahaja. Kelulusan admin diperlukan sebelum kemas kini database.</div>
    <div className="card">
      <div className="card-header"><div className="card-title"><span className="card-title-icon">📡</span>Sumber Pemantauan</div><button className="btn btn-primary btn-sm">🔄 Imbas Sekarang</button></div>
      {[
        {status:"ok",source:"Shopee Seller Education Hub",url:"seller.shopee.com.my/edu",lastCheck:"2 jam lalu",confidence:98},
        {status:"ok",source:"Shopee Official Announcement",url:"seller.shopee.com.my",lastCheck:"2 jam lalu",confidence:97},
        {status:"change",source:"TikTok Shop Academy MY",url:"seller-my.tiktok.com/academy",lastCheck:"45 min lalu",confidence:91,change:"Struktur komisyen affiliate baru dikesan"},
        {status:"ok",source:"TikTok Seller Centre MY",url:"seller-my.tiktok.com",lastCheck:"1 jam lalu",confidence:95},
      ].map((m,i)=>(
        <div key={i} className="monitor-item">
          <div className={`monitor-dot ${m.status}`}/>
          <div style={{flex:1}}>
            <div className="monitor-source">{m.source}</div>
            <div className="monitor-detail">{m.url} · Disemak {m.lastCheck}</div>
            {m.change&&<div style={{fontSize:12,color:"#D97706",marginTop:4,fontWeight:600}}>⚡ {m.change}</div>}
            <div className="confidence-bar">
              <span style={{fontSize:10,color:"#9CA3AF",fontWeight:600}}>Keyakinan</span>
              <div className="confidence-track"><div className="confidence-fill" style={{width:`${m.confidence}%`}}/></div>
              <span className="confidence-label">{m.confidence}%</span>
            </div>
          </div>
          <span className={`badge ${m.status==="ok"?"badge-verified":"badge-warning"}`}>{m.status==="ok"?"✓ Terkini":"⚡ Perubahan"}</span>
        </div>
      ))}
    </div>
  </>);
}

function Admin({feeDb,setFeeDb,adminTab,setAdminTab}) {
  return (<>
    <div className="card">
      <div className="card-header"><div className="card-title"><span className="card-title-icon">⚙</span>Enjin Fee — Database Langsung</div><button className="btn btn-primary btn-sm">💾 Simpan Semua</button></div>
      <div className="tabs">
        <button className={`tab ${adminTab==="shopee"?"active":""}`} onClick={()=>setAdminTab("shopee")}>🛍️ Shopee Malaysia</button>
        <button className={`tab ${adminTab==="tiktok"?"active":""}`} onClick={()=>setAdminTab("tiktok")}>🎵 TikTok Shop Malaysia</button>
      </div>
      <table className="data-table">
        <thead><tr><th>Kategori</th><th>Komisyen %</th><th>Transaksi %</th><th>Platform %</th><th>Pembayaran %</th><th>Jumlah</th><th>Status</th></tr></thead>
        <tbody>
          {Object.entries(feeDb[adminTab].categories).map(([cat,rule])=>(
            <tr key={cat}>
              <td style={{fontWeight:700,color:"#111827"}}>{cat}</td>
              {["commission","transaction","platform","payment"].map(f=>(
                <td key={f}><input className="admin-input" type="number" min="0" step="0.1" value={rule[f]}
                  onChange={e=>setFeeDb(p=>({...p,[adminTab]:{...p[adminTab],categories:{...p[adminTab].categories,[cat]:{...rule,[f]:parseFloat(e.target.value)||0}}}}))}
                /></td>
              ))}
              <td><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:800,color:"#C0000A"}}>{(rule.commission+rule.transaction+rule.platform+rule.payment).toFixed(1)}%</span></td>
              <td><span className="badge badge-verified">{rule.verified?"✓ Disahkan":"Dalam Semakan"}</span></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
